<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurolens 1.5 | Healthcare Ecosystem</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-blue: #005bb5;
            --accent-hover: #0073e6;
            --error-red: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Login / Register Screen */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20vh;
            text-align: center;
        }

        #auth-screen h1 { font-size: 2rem; letter-spacing: 2px; }
        #auth-screen p { color: var(--text-muted); margin-bottom: 30px; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--card-bg);
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-blue);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover { background-color: var(--accent-hover); }

        /* Main Dashboard & Chat */
        #main-app {
            display: none;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h2 { margin: 0; font-size: 1.5rem; }
        .header p { color: var(--accent-blue); margin: 5px 0 0 0; font-weight: bold; cursor: pointer; }

        .chat-box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.4;
        }

        .msg-user {
            background-color: var(--accent-blue);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .msg-ai {
            background-color: #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .msg-error {
            background-color: rgba(255, 77, 77, 0.1);
            color: var(--error-red);
            border: 1px solid var(--error-red);
            align-self: center;
            text-align: center;
            width: 90%;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .chat-box { height: 60vh; }
            #auth-screen h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen">
            <h1>NEUROLENS 1.5</h1>
            <p>SECURE HEALTHCARE ECOSYSTEM</p>
            <input type="text" id="username-input" placeholder="Enter Patient Name to Register..." autocomplete="off">
            <button onclick="loginUser()">Access System</button>
        </div>

        <div id="main-app">
            <div class="header">
                <h2 id="greeting">Health Chatbot</h2>
                <p onclick="logoutUser()">[ Logout ]</p>
            </div>

            <div class="chat-box" id="chat-history">
                <div class="message msg-ai">Hello! I am the Neurolens AI. Ask me about your symptoms.</div>
            </div>

            <div class="input-area">
                <input type="text" id="chat-input" placeholder="E.g., I have a severe headache..." onkeypress="handleEnter(event)">
                <button style="width: 30%;" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Check if user is already logged in on this device
        window.onload = function() {
            const savedUser = localStorage.getItem('neurolens_user');
            if (savedUser) {
                showApp(savedUser);
            }
        };

        function loginUser() {
            const name = document.getElementById('username-input').value.trim();
            if (name) {
                localStorage.setItem('neurolens_user', name);
                showApp(name);
            } else {
                alert("Please enter a name to register your device.");
            }
        }

        function logoutUser() {
            localStorage.removeItem('neurolens_user');
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('chat-history').innerHTML = '<div class="message msg-ai">Hello! I am the Neurolens AI. Ask me about your symptoms.</div>';
        }

        function showApp(userName) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('greeting').innerText = `Welcome, ${userName}`;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('chat-input');
            const messageText = inputField.value.trim();
            const chatHistory = document.getElementById('chat-history');

            if (!messageText) return;

            // Add user message to UI
            chatHistory.innerHTML += `<div class="message msg-user">${messageText}</div>`;
            inputField.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // THE FIXED CLOUD API URL
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                
                // Assuming your Python backend returns {"response": "AI text here"}
                // Adjust 'data.response' if your python file uses a different key!
                const aiReply = data.response || "I processed your request, but received an empty response.";
                
                chatHistory.innerHTML += `<div class="message msg-ai">${aiReply}</div>`;

            } catch (error) {
                console.error('Fetch error:', error);
                chatHistory.innerHTML += `<div class="message msg-error">Error. Server API failed to fetch. Ensure backend is running.</div>`;
            }
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
